spring:
  application:
    name: backend
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 587
    username: test@example.com
    password: password
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

cors:
  allowed-origin: http://localhost:5173

jwt:
  secret: dummy_jwt_secret_must_be_at_least_256_bits_long_so_we_just_make_it_very_long_for_hs256_compatibility_1234567890
  expirationMs: 86400000

app:
  url: http://localhost:5173
  stock-alert:
    cooldown-hours: 24

management:
  endpoints:
    web:
      exposure:
        include: health,info
